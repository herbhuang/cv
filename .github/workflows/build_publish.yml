---
name: Build and Publish PDF

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Build all CV PDFs
        uses: xu-cheng/latex-action@v4
        with:
          # latexmk multi-pass; three entry points share _cv-content.tex
          root_file: |
            cv-hhuang.tex
            cv-hhuang.short.tex
            cv-hhuang-onepage.tex

      - name: Stage PDFs for R2
        run: |
          mkdir -p dist
          cp cv-hhuang.pdf dist/cv-hhuang.pdf
          cp cv-hhuang.short.pdf dist/cv-hhuang.short.pdf
          cp cv-hhuang-onepage.pdf dist/cv-hhuang.onepage.pdf
          ls -la dist/

      - name: Upload PDFs to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: dist
          destination-dir: ./pdf/
          keep-file-fresh: true
